<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ThePlayLenz — Links</title>
  <meta name="description" content="See Different. Play Different. Live Different. Streams, clips & content across Twitch, YouTube, Instagram, TikTok and X." />

  <!-- Open Graph / social previews -->
  <meta property="og:title" content="ThePlayLenz" />
  <meta property="og:description" content="See Different. Play Different. Live Different." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://theplaylenz.com" />
  <meta property="og:image" content="/og-image.png" />
  <meta name="theme-color" content="#0A0420" />

  <!-- Favicon -->
  <link rel="icon" href="favicon.jpg" type="image/jpeg" />
  <link rel="apple-touch-icon" href="logo-icon.jpg" />

  <!-- Fonts: Poppins per brand guidelines -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Brand palette — from mockup sheet (option B) */
      --c1: #F59E0B; /* orange */
      --c2: #F06B5E; /* coral */
      --c3: #D946A4; /* magenta/pink */
      --c4: #9333EA; /* purple */
      --c5: #4F46E5; /* indigo */
      --ink: #FFFFFF;
      --muted: #B4AEC9;
      --bg-0: #05020F;
      --bg-1: #0A0420;
      --card:  rgba(255,255,255,0.04);
      --card-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.10);
      --border-hover: rgba(255,255,255,0.25);
      --brand-gradient: linear-gradient(90deg, var(--c1), var(--c2), var(--c3), var(--c4), var(--c5));
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(60% 60% at 20% 0%, rgba(245,158,11,0.12), transparent 60%),
        radial-gradient(60% 60% at 80% 10%, rgba(217,70,164,0.14), transparent 60%),
        radial-gradient(70% 70% at 50% 100%, rgba(79,70,229,0.18), transparent 60%),
        var(--bg-1);
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      padding: 36px 20px 64px;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* Avatar using the aperture logo icon */
    .avatar {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      overflow: hidden;
      display: inline-block;
      background: var(--bg-0);
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.03),
        0 20px 40px -10px rgba(147, 51, 234, 0.4);
      margin-bottom: 22px;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Wordmark banner */
    .wordmark {
      max-width: 340px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 10px;
    }

    .tagline {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      background: var(--brand-gradient);
      -webkit-background-clip: text;
              background-clip: text;
      color: transparent;
      margin: 0 0 32px;
    }

    /* Fallback H1 — hidden by default; shows only if wordmark image fails */
    h1.fallback {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 38px;
      letter-spacing: -1px;
      margin: 0 0 8px;
      display: none;
    }

    .links { display: flex; flex-direction: column; gap: 12px; }

    a.btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--card);
      color: var(--ink);
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    a.btn:hover, a.btn:focus-visible {
      background: var(--card-hover);
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -10px rgba(217, 70, 164, 0.35);
      outline: none;
    }
    a.btn:active { transform: translateY(0); }

    a.btn .icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    a.btn .label { flex: 1; text-align: left; }
    a.btn .sub { display: block; font-weight: 400; font-size: 12px; color: var(--muted); margin-top: 2px; }
    a.btn .chev { width: 18px; height: 18px; opacity: .4; transition: transform .18s ease, opacity .18s ease; }
    a.btn:hover .chev { transform: translateX(4px); opacity: .9; }

    /* Featured button — Twitch, with brand gradient border */
    a.btn.featured {
      position: relative;
      background: #0D0728;
      border: none;
      padding: 16px 18px;
      font-size: 17px;
    }
    a.btn.featured::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: 14px;
      padding: 2px;
      background: var(--brand-gradient);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }
    a.btn.featured .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #FF3D4E;
      box-shadow: 0 0 0 4px rgba(255,61,78,0.25);
      margin-left: 4px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%     { opacity: .6; transform: scale(0.85); }
    }

    /* Brand-colored icon chips */
    .ic-twitch   { background: #9146FF; color: #fff; }
    .ic-youtube  { background: #FF0033; color: #fff; }
    .ic-site     { background: var(--brand-gradient); color: #fff; }
    .ic-ig       { background: linear-gradient(135deg,#F58529,#DD2A7B,#8134AF); color: #fff; }
    .ic-tt       { background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.15); }
    .ic-x        { background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.15); }

    footer {
      margin-top: 34px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.4px;
    }
    footer a { color: var(--ink); text-decoration: none; }
    footer a:hover { background: var(--brand-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }

    @media (max-width: 380px) {
      a.btn { font-size: 15px; padding: 13px 14px; }
      a.btn.featured { font-size: 16px; }
      .avatar { width: 108px; height: 108px; }
    }

    @media (prefers-reduced-motion: reduce) {
      a.btn, a.btn .chev { transition: none; }
      .live-dot { animation: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">

    <!-- Aperture logo icon -->
    <div class="avatar">
      <img src="logo-icon.jpg" alt="ThePlayLenz logo" />
    </div>

    <!-- Wordmark banner -->
    <img class="wordmark" src="logo-wordmark.jpg" alt="ThePlayLenz" onerror="this.style.display='none'; document.querySelector('h1.fallback').style.display='block';" />
    <h1 class="fallback">ThePlayLenz</h1>

    <nav class="links" aria-label="ThePlayLenz links">

      <a class="btn featured" href="https://twitch.tv/theplaylenz" target="_blank" rel="noopener">
        <span class="icon ic-twitch" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4 2h17v12l-5 5h-4l-3 3H7v-3H3V5l1-3zm15 11V4H6v12h3v3l3-3h4l3-3zm-4-7h2v5h-2V6zm-5 0h2v5h-2V6z"/></svg>
        </span>
        <span class="label">
          Watch on Twitch
          <span class="sub">twitch.tv/theplaylenz</span>
        </span>
        <span class="live-dot" aria-hidden="true"></span>
      </a>

      <a class="btn" href="https://www.youtube.com/@theplaylenz" target="_blank" rel="noopener">
        <span class="icon ic-youtube" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M23 7.2a3 3 0 00-2.1-2.1C19 4.5 12 4.5 12 4.5s-7 0-8.9.6A3 3 0 001 7.2 31 31 0 00.5 12 31 31 0 001 16.8a3 3 0 002.1 2.1c1.9.6 8.9.6 8.9.6s7 0 8.9-.6a3 3 0 002.1-2.1A31 31 0 0023.5 12 31 31 0 0023 7.2zM9.8 15.5V8.5L15.8 12l-6 3.5z"/></svg>
        </span>
        <span class="label">
          YouTube
          <span class="sub">youtube.com/@theplaylenz</span>
        </span>
        <svg class="chev" viewBox="0 0 20 20" fill="currentColor"><path d="M7 5l6 5-6 5V5z"/></svg>
      </a>

      <a class="btn" href="https://theplaylenz.com" target="_blank" rel="noopener">
        <span class="icon ic-site" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>
        </span>
        <span class="label">
          theplaylenz.com
          <span class="sub">Official site</span>
        </span>
        <svg class="chev" viewBox="0 0 20 20" fill="currentColor"><path d="M7 5l6 5-6 5V5z"/></svg>
      </a>

      <a class="btn" href="https://instagram.com/theplaylenz" target="_blank" rel="noopener">
        <span class="icon ic-ig" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        </span>
        <span class="label">
          Instagram
          <span class="sub">@theplaylenz</span>
        </span>
        <svg class="chev" viewBox="0 0 20 20" fill="currentColor"><path d="M7 5l6 5-6 5V5z"/></svg>
      </a>

      <a class="btn" href="https://www.tiktok.com/@theplaylenz" target="_blank" rel="noopener">
        <span class="icon ic-tt" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3a5.5 5.5 0 004.5 4.4v3a8.4 8.4 0 01-4.5-1.3v6.6a6.2 6.2 0 11-6.2-6.2c.3 0 .6 0 .9.1v3.1a3.2 3.2 0 103.3 3.2V3h2z"/></svg>
        </span>
        <span class="label">
          TikTok
          <span class="sub">@theplaylenz</span>
        </span>
        <svg class="chev" viewBox="0 0 20 20" fill="currentColor"><path d="M7 5l6 5-6 5V5z"/></svg>
      </a>

      <a class="btn" href="https://x.com/theplaylenz" target="_blank" rel="noopener">
        <span class="icon ic-x" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.9 3H22l-7.6 8.7L23 21h-6.8l-5.3-6.5L4.8 21H1.6l8.2-9.4L1 3h7l4.8 6 6.1-6z"/></svg>
        </span>
        <span class="label">
          X (Twitter)
          <span class="sub">@theplaylenz</span>
        </span>
        <svg class="chev" viewBox="0 0 20 20" fill="currentColor"><path d="M7 5l6 5-6 5V5z"/></svg>
      </a>

    </nav>

    <footer>
      &copy; <span id="year"></span> ThePlayLenz &middot; All rights reserved
    </footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
